<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>discord-bot-admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0d;
      --bg-raised: #161614;
      --bg-input:  #1a1a18;
      --border:    #2a2925;
      --border-hi: #3d3a33;
      --text:      #ebe5d8;
      --text-dim:  #8a8478;
      --text-mute: #5a554c;
      --accent:    #d97757;
      --accent-hi: #e89878;
      --accent-dim:#6e3a2a;
      --ok:        #7cb87c;
      --err:       #d97070;
      --warn:      #d9a860;
      --info:      #7ca8d9;
      color-scheme: dark;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code',
                   'Roboto Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
      font-variant-numeric: tabular-nums;
    }

    /* ── Window chrome ─────────────────────────── */

    .window {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: min(920px, 100vw);
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .window-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .dots {
      display: flex;
      gap: 5px;
    }
    .dots i {
      display: block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }
    .dots i:nth-child(1) { background: #ff5f57; }
    .dots i:nth-child(2) { background: #ffbd2e; }
    .dots i:nth-child(3) { background: #28c840; }

    .win-title {
      flex: 1;
      text-align: center;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .win-hint {
      font-size: 11px;
      color: var(--text-mute);
    }

    /* ── Terminal output ───────────────────────── */

    .term-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem 0.5rem;
      scroll-behavior: smooth;
    }

    .term-wrap.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: -4px;
    }

    .line {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 0.04rem 0;
    }
    .line-ok    { color: var(--ok); }
    .line-err   { color: var(--err); }
    .line-warn  { color: var(--warn); }
    .line-info  { color: var(--info); }
    .line-wait  { color: var(--text-dim); }
    .line-plain { color: var(--text); }
    .line-echo  { color: var(--accent); }
    .line-mute  { color: var(--text-mute); }
    .line-blank { height: 0.55rem; }

    /* ── Inline editor panel ───────────────────── */

    .editor-panel {
      margin: 0.5rem 0;
      border: 1px solid var(--border-hi);
      border-radius: 3px;
      background: var(--bg-raised);
    }

    .editor-header {
      padding: 0.3rem 0.75rem;
      font-size: 11px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    .editor-panel textarea {
      display: block;
      width: 100%;
      min-height: 120px;
      padding: 0.5rem 0.75rem;
      background: transparent;
      color: var(--text);
      border: none;
      resize: vertical;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.55;
      caret-color: var(--accent);
      outline: none;
    }

    .editor-footer {
      padding: 0.25rem 0.75rem;
      font-size: 11px;
      color: var(--text-mute);
      border-top: 1px solid var(--border);
    }

    /* ── Prompt input row ──────────────────────── */

    .prompt-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0.5rem 1.5rem 0.75rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .prompt-label {
      color: var(--accent);
      white-space: nowrap;
      padding-right: 0.5rem;
      font-size: 13px;
      user-select: none;
    }

    #cmdInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      caret-color: var(--accent);
    }
    #cmdInput::placeholder {
      color: var(--text-mute);
    }

    /* ── Tab completion hint ───────────────────── */

    .completion-hint {
      padding: 0.15rem 1.5rem;
      font-size: 11px;
      color: var(--text-mute);
      flex-shrink: 0;
      min-height: 1rem;
    }
  </style>
</head>
<body>

<div class="window">
  <!-- Window bar -->
  <div class="window-bar">
    <span class="dots"><i></i><i></i><i></i></span>
    <span class="win-title">discord-bot-admin</span>
    <span class="win-hint">type "help" for commands</span>
  </div>

  <!-- Terminal output -->
  <div class="term-wrap" id="termOutput"></div>

  <!-- Tab completion hint -->
  <div class="completion-hint" id="completionHint"></div>

  <!-- Prompt input -->
  <div class="prompt-row">
    <span class="prompt-label" id="promptLabel">_/_ ❯</span>
    <input type="text" id="cmdInput" autocomplete="off" spellcheck="false" placeholder="type a command...">
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" multiple hidden>

<script>
'use strict';

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────

const state = {
  guilds: [],
  currentGuildId: null,
  currentGuildName: null,
  channels: [],
  currentChannelId: null,
  currentChannelName: null,
  content: '',
  embeds: [],
  files: [],
  history: [],
  historyIdx: -1,
  historyDraft: '',
  lastListing: null,  // 'servers' | 'channels' | null
  editorOpen: false,
};

// ─────────────────────────────────────────────
// DOM references
// ─────────────────────────────────────────────

const termOutput    = document.getElementById('termOutput');
const promptLabel   = document.getElementById('promptLabel');
const cmdInput      = document.getElementById('cmdInput');
const completionHint = document.getElementById('completionHint');
const fileInput     = document.getElementById('fileInput');

// ─────────────────────────────────────────────
// Output helpers
// ─────────────────────────────────────────────

function println(level, text) {
  const row = document.createElement('div');
  row.className = 'line line-' + level;
  const prefix = { ok: '[OK]', err: '[ERR]', info: '[→]', wait: '[..]', warn: '[!!]' };
  if (level === 'echo')  text = '> ' + text;
  else if (prefix[level]) text = prefix[level] + ' ' + text;
  row.textContent = text;
  termOutput.appendChild(row);
  scrollBottom();
}

function printBlank() {
  const row = document.createElement('div');
  row.className = 'line line-blank';
  termOutput.appendChild(row);
}

function printLines(level, lines) {
  for (const l of lines) println(level, l);
}

function scrollBottom() {
  termOutput.scrollTop = termOutput.scrollHeight;
}

function updatePrompt() {
  const g = state.currentGuildName ?? '_';
  const c = state.currentChannelName ? '#' + state.currentChannelName : '_';
  promptLabel.textContent = g + '/' + c + ' ❯';
}

// ─────────────────────────────────────────────
// API helpers
// ─────────────────────────────────────────────

async function apiFetch(url, opts) {
  const res = await fetch(url, opts);
  const json = await res.json();
  if (!json.success) throw new Error(json.error ?? 'unknown error');
  return json.data;
}

// ─────────────────────────────────────────────
// Initialise: load guilds
// ─────────────────────────────────────────────

async function init() {
  println('plain', '$ discord-bot-admin v1.0.0');
  println('info',  'connecting...');
  try {
    const guilds = await apiFetch('/api/guilds');
    state.guilds = guilds;
    println('ok', guilds.length + ' guild(s) ready');
    println('info', 'type "help" to see available commands');
  } catch (e) {
    println('err', 'failed to load guilds: ' + e.message);
  }
  printBlank();
  cmdInput.focus();
}

// ─────────────────────────────────────────────
// Inline editor (multi-line / JSON)
// ─────────────────────────────────────────────

function openEditor(title, defaultValue, onSave) {
  if (state.editorOpen) return;
  state.editorOpen = true;

  // Hide prompt
  document.querySelector('.prompt-row').style.display = 'none';
  completionHint.textContent = '';

  const panel = document.createElement('div');
  panel.className = 'editor-panel';

  const header = document.createElement('div');
  header.className = 'editor-header';
  header.textContent = '── editor: ' + title + ' (Ctrl+Enter save · Esc cancel) ──';

  const ta = document.createElement('textarea');
  ta.value = defaultValue;

  const footer = document.createElement('div');
  footer.className = 'editor-footer';
  footer.textContent = 'Ctrl+Enter or ⌘+Enter to save · Esc to cancel';

  panel.appendChild(header);
  panel.appendChild(ta);
  panel.appendChild(footer);
  termOutput.appendChild(panel);
  scrollBottom();
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  function close() {
    panel.remove();
    state.editorOpen = false;
    document.querySelector('.prompt-row').style.display = '';
    cmdInput.focus();
  }

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      println('mute', '(cancelled)');
      close();
    } else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      const val = ta.value;
      close();
      onSave(val);
    }
  });
}

// ─────────────────────────────────────────────
// File helpers
// ─────────────────────────────────────────────

const MAX_FILES = 10;
const MAX_SIZE  = 25 * 1024 * 1024;

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1024 / 1024).toFixed(1) + ' MB';
}

function addFiles(fileList, source) {
  const added = [];
  for (const f of fileList) {
    if (state.files.length >= MAX_FILES) {
      println('err', 'max ' + MAX_FILES + ' files — skipping ' + f.name);
      break;
    }
    if (f.size > MAX_SIZE) {
      println('err', f.name + ' exceeds 25MB — skipped');
      continue;
    }
    state.files.push(f);
    added.push(f);
  }
  if (added.length > 0) {
    println('ok', (source === 'drop' ? 'dropped' : 'staged') + ' ' + added.length + ' file(s):');
    for (let i = 0; i < added.length; i++) {
      const idx = state.files.length - added.length + i;
      println('plain', '  [' + idx + '] ' + added[i].name + '   ' + formatBytes(added[i].size));
    }
  }
}

// ─────────────────────────────────────────────
// Commands
// ─────────────────────────────────────────────

const COMMANDS = [
  'help', '?',
  'servers', 'ls',
  'channels',
  'use',
  'msg',
  'file',
  'embed',
  'status', 'st',
  'send',
  'clear', 'cls',
  'exit',
];

async function execCmd(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  // history
  if (state.history[0] !== trimmed) state.history.unshift(trimmed);
  if (state.history.length > 100) state.history.pop();
  state.historyIdx = -1;
  state.historyDraft = '';

  println('echo', trimmed);

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  switch (cmd) {
    case 'help':
    case '?':
      cmdHelp();
      break;
    case 'servers':
      cmdServers();
      break;
    case 'ls':
      if (!args[0] || args[0] === 'servers') cmdServers();
      else if (args[0] === 'channels') await cmdChannels();
      else println('err', 'unknown: ls ' + args[0]);
      break;
    case 'channels':
      await cmdChannels();
      break;
    case 'use':
      await cmdUse(args);
      break;
    case 'msg':
      cmdMsg(args);
      break;
    case 'file':
      await cmdFile(args);
      break;
    case 'embed':
      cmdEmbed(args);
      break;
    case 'status':
    case 'st':
      cmdStatus();
      break;
    case 'send':
      await cmdSend();
      break;
    case 'clear':
      cmdClear();
      break;
    case 'cls':
    case 'clear screen':
      termOutput.innerHTML = '';
      break;
    case 'exit':
      println('warn', 'cannot close browser tab from here — close manually');
      break;
    default:
      println('err', 'unknown command: ' + cmd + ' — type "help"');
  }
  printBlank();
}

// ── help ─────────────────────────────────────

function cmdHelp() {
  const lines = [
    '  servers               list guilds the bot is in',
    '  channels              list text channels in current server',
    '  use <idx|id>          select guild (after servers) or channel (after channels)',
    '  use server <idx|id>   explicitly select guild',
    '  use channel <idx|id>  explicitly select channel',
    '  msg <text>            stage a one-line message',
    '  msg                   open multi-line editor',
    '  file                  open file picker',
    '  file ls               list staged files',
    '  file rm <idx>         remove staged file',
    '  embed                 open embed JSON editor',
    '  embed ls              list staged embeds',
    '  embed rm <idx>        remove staged embed',
    '  status                show staged state',
    '  send                  send message to current channel',
    '  clear                 clear staged content/embeds/files',
    '  cls                   clear terminal output',
    '  help / ?              show this help',
    '',
    '  keyboard:  ↑↓ history · Tab completion · Ctrl+C cancel · Ctrl+U clear line',
    '  editor:    Ctrl+Enter save · Esc cancel',
  ];
  println('plain', 'available commands:');
  for (const l of lines) println('plain', l);
}

// ── servers ───────────────────────────────────

function cmdServers() {
  if (state.guilds.length === 0) {
    println('warn', 'no guilds loaded — try refreshing the page');
    return;
  }
  println('plain', 'guilds (' + state.guilds.length + '):');
  state.guilds.forEach((g, i) => {
    const mark = g.id === state.currentGuildId ? ' ◀' : '';
    println('plain', '  [' + i + '] ' + g.id + '  ' + g.name + mark);
  });
  state.lastListing = 'servers';
}

// ── channels ──────────────────────────────────

async function cmdChannels() {
  if (!state.currentGuildId) {
    println('err', 'no server selected — run "servers" then "use <idx>"');
    return;
  }
  println('info', 'loading channels for ' + state.currentGuildName + '...');
  try {
    const channels = await apiFetch('/api/guilds/' + state.currentGuildId + '/channels');
    state.channels = channels;
    if (channels.length === 0) {
      println('warn', 'no sendable channels found');
      return;
    }
    // Group by parentName
    const groups = {};
    for (const c of channels) {
      const key = c.parentName ?? '(no category)';
      if (!groups[key]) groups[key] = [];
      groups[key].push(c);
    }
    println('plain', 'channels (' + channels.length + '):');
    let globalIdx = 0;
    for (const [cat, chans] of Object.entries(groups)) {
      println('mute', '  ── ' + cat + ' ──');
      for (const c of chans) {
        const icon = c.type === 'announcement' ? '📣' : '#';
        const mark = c.id === state.currentChannelId ? ' ◀' : '';
        println('plain', '    [' + globalIdx + '] ' + icon + ' ' + c.name.padEnd(22) + '  ' + c.id + mark);
        globalIdx++;
      }
    }
    state.lastListing = 'channels';
  } catch (e) {
    println('err', 'failed to load channels: ' + e.message);
  }
}

// ── use ───────────────────────────────────────

async function cmdUse(args) {
  if (args.length === 0) {
    println('err', 'usage: use <idx|id>  or  use server <idx|id>  or  use channel <idx|id>');
    return;
  }

  let target = null;  // 'server' | 'channel' | null (infer)
  let selector = null;

  if (args[0] === 'server') {
    target = 'server';
    selector = args[1];
  } else if (args[0] === 'channel') {
    target = 'channel';
    selector = args[1];
  } else {
    selector = args[0];
    // Infer from lastListing
    if (state.lastListing === 'servers') target = 'server';
    else if (state.lastListing === 'channels') target = 'channel';
    else {
      println('err', 'specify: "use server <idx>" or "use channel <idx>"');
      return;
    }
  }

  if (!selector) {
    println('err', 'usage: use ' + target + ' <idx|id>');
    return;
  }

  if (target === 'server') {
    const g = resolveItem(state.guilds, selector);
    if (!g) { println('err', 'server not found: ' + selector); return; }
    state.currentGuildId   = g.id;
    state.currentGuildName = g.name;
    state.currentChannelId   = null;
    state.currentChannelName = null;
    state.channels = [];
    state.lastListing = null;
    updatePrompt();
    println('ok', 'server = ' + g.name + ' (' + g.id + ')');
    println('info', 'run "channels" to list channels');
  } else {
    if (!state.currentGuildId) {
      println('err', 'select a server first');
      return;
    }
    if (state.channels.length === 0) {
      println('info', 'loading channels...');
      try {
        state.channels = await apiFetch('/api/guilds/' + state.currentGuildId + '/channels');
      } catch (e) {
        println('err', 'failed to load channels: ' + e.message);
        return;
      }
    }
    const c = resolveItem(state.channels, selector);
    if (!c) { println('err', 'channel not found: ' + selector); return; }
    state.currentChannelId   = c.id;
    state.currentChannelName = c.name;
    state.lastListing = null;
    updatePrompt();
    println('ok', 'channel = #' + c.name + ' (' + c.id + ')');
  }
}

function resolveItem(arr, selector) {
  // Try by index
  const idx = parseInt(selector, 10);
  if (!isNaN(idx) && idx >= 0 && idx < arr.length) return arr[idx];
  // Try by id
  return arr.find(x => x.id === selector) ?? null;
}

// ── msg ───────────────────────────────────────

function cmdMsg(args) {
  if (args.length === 0) {
    // Open multi-line editor
    openEditor('message', state.content, (val) => {
      state.content = val;
      if (val.trim()) {
        println('echo', 'msg (editor)');
        println('ok', 'content staged (' + val.length + ' chars)');
      } else {
        println('echo', 'msg (editor)');
        println('ok', 'content cleared');
      }
      printBlank();
    });
  } else {
    const text = args.join(' ');
    if (text.length > 2000) {
      println('err', 'content exceeds 2000 chars (' + text.length + ')');
      return;
    }
    state.content = text;
    println('ok', 'content staged (' + text.length + ' chars)');
  }
}

// ── file ──────────────────────────────────────

async function cmdFile(args) {
  const sub = args[0]?.toLowerCase();

  if (!sub || sub === 'add') {
    // Open file picker (must be triggered by user gesture)
    fileInput.value = '';
    fileInput.click();
    return;
  }

  if (sub === 'ls') {
    if (state.files.length === 0) {
      println('plain', '  (no files staged)');
      return;
    }
    println('plain', 'staged files (' + state.files.length + '):');
    state.files.forEach((f, i) => {
      println('plain', '  [' + i + '] ' + f.name + '   ' + formatBytes(f.size));
    });
    return;
  }

  if (sub === 'rm') {
    const idx = parseInt(args[1], 10);
    if (isNaN(idx) || idx < 0 || idx >= state.files.length) {
      println('err', 'usage: file rm <idx>  (0–' + (state.files.length - 1) + ')');
      return;
    }
    const removed = state.files.splice(idx, 1)[0];
    println('ok', 'removed files[' + idx + '] ' + removed.name);
    return;
  }

  println('err', 'unknown: file ' + sub + ' — try: file, file ls, file rm <idx>');
}

// ── embed ─────────────────────────────────────

const EMBED_TEMPLATE = JSON.stringify({
  title: '',
  description: '',
  color: '#d97757',
  url: '',
  authorName: '',
  authorUrl: '',
  footerText: '',
  imageUrl: '',
  thumbnailUrl: '',
  fields: [
    { name: 'field name', value: 'field value', inline: false }
  ],
  timestamp: false,
}, null, 2);

function validateEmbedJson(raw) {
  // Light client-side validation
  const obj = JSON.parse(raw);  // throws on bad JSON
  if (typeof obj !== 'object' || Array.isArray(obj) || obj === null) {
    throw new Error('embed must be a JSON object');
  }
  if (obj.title && typeof obj.title !== 'string') throw new Error('title must be a string');
  if (obj.description && typeof obj.description !== 'string') throw new Error('description must be a string');
  if (obj.color && !/^#?[0-9a-fA-F]{6}$/.test(obj.color)) throw new Error('color must be #rrggbb');
  if (obj.fields) {
    if (!Array.isArray(obj.fields)) throw new Error('fields must be an array');
    for (const f of obj.fields) {
      if (!f.name || !f.value) throw new Error('each field must have name and value');
    }
  }
  return obj;
}

function cmdEmbed(args) {
  const sub = args[0]?.toLowerCase();

  if (!sub) {
    // Open new embed editor
    openEditor('embed JSON', EMBED_TEMPLATE, (raw) => {
      println('echo', 'embed (editor)');
      try {
        const obj = validateEmbedJson(raw);
        state.embeds.push(obj);
        const t = obj.title || 'untitled';
        println('ok', 'embed[' + (state.embeds.length - 1) + '] staged — ' + t);
      } catch (e) {
        println('err', 'invalid embed JSON: ' + e.message);
      }
      printBlank();
    });
    return;
  }

  if (sub === 'ls') {
    if (state.embeds.length === 0) {
      println('plain', '  (no embeds staged)');
      return;
    }
    println('plain', 'staged embeds (' + state.embeds.length + '):');
    state.embeds.forEach((e, i) => {
      const t = e.title || 'untitled';
      println('plain', '  [' + i + '] ' + t + (e.description ? '  — ' + e.description.slice(0, 40) : ''));
    });
    return;
  }

  if (sub === 'rm') {
    const idx = parseInt(args[1], 10);
    if (isNaN(idx) || idx < 0 || idx >= state.embeds.length) {
      println('err', 'usage: embed rm <idx>  (0–' + (state.embeds.length - 1) + ')');
      return;
    }
    const removed = state.embeds.splice(idx, 1)[0];
    println('ok', 'removed embed[' + idx + '] ' + (removed.title || 'untitled'));
    return;
  }

  println('err', 'unknown: embed ' + sub + ' — try: embed, embed ls, embed rm <idx>');
}

// ── status ────────────────────────────────────

function cmdStatus() {
  const g = state.currentGuildName ?? '(none)';
  const c = state.currentChannelName ? '#' + state.currentChannelName : '(none)';
  println('plain', '  server  : ' + g);
  println('plain', '  channel : ' + c);
  println('plain', '  content : ' + (state.content ? '"' + state.content.slice(0, 60) + (state.content.length > 60 ? '…' : '') + '" (' + state.content.length + ' chars)' : '(empty)'));
  println('plain', '  embeds  : ' + (state.embeds.length > 0 ? state.embeds.length + ' embed(s)' : '(none)'));
  println('plain', '  files   : ' + (state.files.length > 0 ? state.files.map((f, i) => '[' + i + '] ' + f.name).join(', ') : '(none)'));
}

// ── send ──────────────────────────────────────

async function cmdSend() {
  if (!state.currentChannelId) {
    println('err', 'no channel selected — run "channels" then "use <idx>"');
    return;
  }
  if (!state.content && state.embeds.length === 0 && state.files.length === 0) {
    println('err', 'nothing to send — stage content, embeds, or files first');
    return;
  }

  println('wait', 'sending...');

  const fd = new FormData();
  fd.append('channelId', state.currentChannelId);
  if (state.content) fd.append('content', state.content);
  if (state.embeds.length > 0) fd.append('embeds', JSON.stringify(state.embeds));
  for (const f of state.files) fd.append('files', f, f.name);

  try {
    const data = await apiFetch('/api/send', { method: 'POST', body: fd });
    println('ok', 'sent  messageId=' + data.messageId + '  ch=' + data.channelId);
    // Clear staged content after success
    state.content = '';
    state.embeds  = [];
    state.files   = [];
  } catch (e) {
    println('err', e.message);
  }
}

// ── clear ─────────────────────────────────────

function cmdClear() {
  state.content = '';
  state.embeds  = [];
  state.files   = [];
  println('ok', 'staged content, embeds and files cleared  (server/channel unchanged)');
}

// ─────────────────────────────────────────────
// Tab completion
// ─────────────────────────────────────────────

function getCompletions(partial) {
  const parts = partial.trimStart().split(/\s+/);
  const first = parts[0]?.toLowerCase() ?? '';

  if (parts.length === 1) {
    // Complete command names
    return COMMANDS.filter(c => c.startsWith(first));
  }

  if (first === 'use' && parts.length === 2) {
    const sub = parts[1].toLowerCase();
    const opts = ['server', 'channel'];
    const numbered = state.lastListing === 'servers'
      ? state.guilds.map((_, i) => String(i))
      : state.lastListing === 'channels'
        ? state.channels.map((_, i) => String(i))
        : [];
    return [...opts, ...numbered].filter(x => x.startsWith(sub));
  }

  if ((first === 'file') && parts.length === 2) {
    return ['ls', 'rm', 'add'].filter(x => x.startsWith(parts[1].toLowerCase()));
  }

  if ((first === 'embed') && parts.length === 2) {
    return ['ls', 'rm'].filter(x => x.startsWith(parts[1].toLowerCase()));
  }

  return [];
}

let completions = [];
let completionIdx = 0;

cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const partial = cmdInput.value;
    const c = getCompletions(partial);
    if (c.length === 0) {
      completionHint.textContent = '';
      return;
    }
    if (c.length === 1) {
      // Complete directly
      const parts = partial.trimStart().split(/\s+/);
      parts[parts.length - 1] = c[0];
      cmdInput.value = parts.join(' ') + ' ';
      completionHint.textContent = '';
    } else {
      // Cycle through
      completions = c;
      completionHint.textContent = c.join('   ');
      const parts = partial.trimStart().split(/\s+/);
      parts[parts.length - 1] = c[completionIdx % c.length];
      cmdInput.value = parts.join(' ');
      completionIdx = (completionIdx + 1) % c.length;
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (state.history.length === 0) return;
    if (state.historyIdx === -1) state.historyDraft = cmdInput.value;
    state.historyIdx = Math.min(state.historyIdx + 1, state.history.length - 1);
    cmdInput.value = state.history[state.historyIdx] ?? '';
    completionHint.textContent = '';
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (state.historyIdx <= -1) return;
    state.historyIdx--;
    cmdInput.value = state.historyIdx === -1 ? state.historyDraft : (state.history[state.historyIdx] ?? '');
    completionHint.textContent = '';
  } else if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const val = cmdInput.value;
    cmdInput.value = '';
    completionHint.textContent = '';
    completions = [];
    completionIdx = 0;
    execCmd(val);
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    const val = cmdInput.value;
    cmdInput.value = '';
    if (val) {
      const row = document.createElement('div');
      row.className = 'line line-mute';
      row.textContent = '> ' + val + ' ^C';
      termOutput.appendChild(row);
      printBlank();
      scrollBottom();
    }
    completionHint.textContent = '';
  } else if (e.key === 'u' && e.ctrlKey) {
    e.preventDefault();
    cmdInput.value = '';
    completionHint.textContent = '';
  } else {
    completionHint.textContent = '';
    completionIdx = 0;
    completions = [];
  }
});

// ─────────────────────────────────────────────
// File input events
// ─────────────────────────────────────────────

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) {
    println('echo', 'file');
    addFiles(Array.from(fileInput.files), 'picker');
    printBlank();
  }
  fileInput.value = '';
  cmdInput.focus();
});

// ─────────────────────────────────────────────
// Drag & drop onto terminal
// ─────────────────────────────────────────────

termOutput.addEventListener('dragover', (e) => {
  e.preventDefault();
  termOutput.classList.add('drag-over');
});
termOutput.addEventListener('dragleave', (e) => {
  if (!termOutput.contains(e.relatedTarget)) {
    termOutput.classList.remove('drag-over');
  }
});
termOutput.addEventListener('drop', (e) => {
  e.preventDefault();
  termOutput.classList.remove('drag-over');
  const dropped = Array.from(e.dataTransfer.files);
  if (dropped.length === 0) return;
  addFiles(dropped, 'drop');
  printBlank();
  scrollBottom();
});

// Click on terminal output focuses input (unless text was selected)
termOutput.addEventListener('click', () => {
  if (window.getSelection()?.toString()) return;
  if (!state.editorOpen) cmdInput.focus();
});

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────

init();
</script>
